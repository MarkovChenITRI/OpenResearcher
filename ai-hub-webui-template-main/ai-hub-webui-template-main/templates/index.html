<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flask WebUI 範例</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Flask API 與 WebUI 範例</h1>
    <p class="description">這是一個簡單的範例,展示如何透過前端呼叫 API 並顯示結果。</p>
    
    <section class="demo-section">
      <h2>從 API 載入資料</h2>
      <button id="loadData" class="btn">點擊載入資料</button>
      <div class="output-container">
        <h3>API 回傳結果:</h3>
        <pre id="output">點擊上方按鈕以載入資料...</pre>
      </div>
    </section>

    <section class="info-section">
      <h2>如何使用</h2>
      <ol>
        <li>點擊「點擊載入資料」按鈕</li>
        <li>前端會透過 JavaScript 呼叫 <code>/api/data</code> 端點</li>
        <li>後端執行運算並回傳 JSON 資料</li>
        <li>前端將結果顯示在下方區域</li>
      </ol>
    </section>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
