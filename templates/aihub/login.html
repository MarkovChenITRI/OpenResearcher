{% extends "aihub/base.html" %}

{% block title %}Login - ITRI AI Hub{% endblock %}

{% block body %}
<main class="flex flex-col justify-center min-h-screen w-full h-full bg-white">
  <section class="flex flex-col justify-center w-full min-h-screen max-md:max-w-full">
    <div class="flex relative flex-col justify-center items-center
                px-16 py-20 w-full min-h-screen max-md:px-5">
      <!-- Background image -->
      <img src="/static/images/login.png" alt=""
           class="object-cover absolute inset-0 size-full"/>

      <!-- Content -->
      <div class="flex relative gap-5 justify-between mt-60 lg:mb-48 w-full
                  max-w-[1400px] max-md:flex-wrap max-md:my-10">

        <!-- Left: Branding -->
        <div class="flex flex-col max-md:max-w-full">
          <div class="flex gap-2.5 self-start">
            <img src="/static/images/logo_black_en.png" alt="ITRI AI Hub"
                 class="shrink-0 max-w-full w-[147px]"/>
          </div>
          <h1 class="mt-16 text-3xl font-black text-login-dark-blue capitalize
                     max-md:mt-10 max-md:max-w-full">
            Discover All AI models for <br/> peak performance!
          </h1>
          <p class="mt-10 text-sm tracking-wide leading-5 text-login-dark-blue max-md:max-w-full">
            Assist me in locating AI models that have undergone optimization<br/>
            and validation through ITRI's expertise.
          </p>
        </div>

        <!-- Right: Login form -->
        <form id="loginForm" onsubmit="AIHub.handleLogin(event)"
              class="lg:h-full flex flex-col justify-between lg:w-[30%] w-full
                     text-sm font-medium text-white lg:space-y-8">
          <div class="lg:size-full flex flex-col justify-start space-y-4">

            <!-- Email -->
            <div class="lg:size-full flex flex-col">
              <label for="emailInput" class="text-login-dark-blue font-semibold mb-1">
                信箱
              </label>
              <input id="emailInput" type="email"
                     placeholder="example@gmail.com"
                     class="justify-center items-start px-5 py-4 mt-2.5 text-xs
                            whitespace-nowrap bg-white rounded-lg shadow-sm
                            text-zinc-500 outline-none border border-transparent
                            focus:border-sky-400 transition-colors max-md:pr-5"
                     required/>
            </div>

            <!-- Password -->
            <div class="lg:size-full flex flex-col">
              <label for="passwordInput" class="text-login-dark-blue font-semibold mb-1">
                密碼
              </label>
              <input id="passwordInput" type="password"
                     placeholder="・・・・・・・・・・"
                     class="justify-center items-start px-5 py-4 mt-2.5 text-xs
                            whitespace-nowrap bg-white rounded-lg shadow-sm
                            text-zinc-500 outline-none border border-transparent
                            focus:border-sky-400 transition-colors max-md:pr-5"
                     required/>
            </div>

          </div>

          <!-- Error message -->
          <p id="loginError" class="text-red-500 text-xs hidden mt-2"></p>

          <!-- Submit -->
          <button type="submit"
                  class="inline-flex justify-center items-center px-5 text-base font-bold
                         text-center whitespace-nowrap bg-sky-900 shadow-sm rounded-[100px]
                         max-md:px-5 h-10 py-5 max-lg:mt-10 hover:bg-sky-800
                         transition-colors disabled:opacity-50 disabled:cursor-not-allowed
                         3xl:text-xl">
            Log In
          </button>
        </form>

      </div>
    </div>
  </section>
</main>
{% endblock %}
