<!DOCTYPE html>
<html lang="en" class="h-screen w-full">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}ITRI AI Hub{% endblock %}</title>
  <meta name="description" content="{% block description %}ITRI AI Hub{% endblock %}"/>
  <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon"/>

  <!-- Google Fonts: Lato -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet"/>

  <!-- Tailwind CSS v3 (CDN for prototyping) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            lato: ['Lato', 'sans-serif'],
          },
          colors: {
            'login-dark-blue': '#1a2e4a',
            'brand-sky': '#0ea5e9',
            'brand-navy': '#0c4a6e',
          },
          screens: {
            '3xl': '1920px',
          },
          borderRadius: {
            'pill': '100px',
            'card': '30px',
          },
          keyframes: {
            'accordion-down': {
              from: { height: '0' },
              to: { height: 'var(--radix-accordion-content-height)' },
            },
            'accordion-up': {
              from: { height: 'var(--radix-accordion-content-height)' },
              to: { height: '0' },
            },
          },
          animation: {
            'accordion-down': 'accordion-down 0.2s ease-out',
            'accordion-up': 'accordion-up 0.2s ease-out',
          },
        },
      },
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/style.css"/>

  {% block extra_head %}{% endblock %}
</head>
<body class="font-lato h-screen w-full">

  {% block body %}{% endblock %}

  <!-- Custom JS -->
  <script src="/static/js/main.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
