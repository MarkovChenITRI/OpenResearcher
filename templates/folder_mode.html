<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenResearcher - 資料夾批次處理模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #667eea;
            margin-right: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        textarea, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .folder-selector {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .folder-selector:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #764ba2;
        }

        .folder-selector.selected {
            background: rgba(102, 126, 234, 0.15);
            border-style: solid;
        }

        .folder-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .folder-info {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            text-align: left;
        }

        .file-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .progress-container {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .progress-text {
            color: #888;
            font-size: 0.95em;
            font-style: italic;
            margin-top: 10px;
        }

        .btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .questions-container {
            margin-top: 30px;
            display: none;
        }

        .questions-container.active {
            display: block;
        }

        .question-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .question-id {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .question-text {
            color: #333;
            font-size: 1.1em;
        }

        .summary-box {
            background: #fff9e6;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .summary-title {
            font-weight: bold;
            color: #f57c00;
            margin-bottom: 10px;
        }

        .error {
            background: #ffe6e6;
            border-left: 4px solid #dc3545;
            padding: 15px;
            border-radius: 8px;
            color: #721c24;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .stat-box {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 OpenResearcher</h1>
            <p>資料夾批次處理模式 - AI 智能研究問題生成器</p>
        </div>

        <div class="content">
            <div class="error" id="error"></div>

            <div class="section">
                <div class="section-title">1️⃣ 研究背景與目標</div>
                <label for="context">描述你的研究主題、目標、問題（必填）</label>
                <textarea id="context" placeholder="例如：我想探討深度學習在醫療影像診斷的應用，特別關注早期癌症檢測的準確性..."></textarea>
            </div>

            <div class="section">
                <div class="section-title">2️⃣ 選擇研究資料夾</div>
                <div class="folder-selector" id="folderSelector">
                    <div class="folder-icon">📁</div>
                    <h3>點擊選擇包含所有研究文件的資料夾</h3>
                    <p style="color: #666; margin-top: 10px;">支援 .md, .txt, .py, .json, .csv, .png, .jpg 等格式</p>
                    <input type="text" id="folderPath" placeholder="或直接輸入資料夾路徑" style="margin-top: 15px; max-width: 500px;">
                </div>

                <div class="folder-info" id="folderInfo" style="display: none;">
                    <div class="stats">
                        <div class="stat-box">
                            <div class="stat-number" id="totalFiles">0</div>
                            <div class="stat-label">總檔案數</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="textFiles">0</div>
                            <div class="stat-label">文字檔案</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="imageFiles">0</div>
                            <div class="stat-label">圖片檔案</div>
                        </div>
                    </div>
                    <div class="file-list" id="fileList"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">3️⃣ 生成設定</div>
                <label for="numQuestions">要生成幾個研究問題？</label>
                <input type="number" id="numQuestions" value="5" min="1" max="20">
            </div>

            <div class="section" style="text-align: center;">
                <button class="btn" id="generateBtn" onclick="generateQuestions()">
                    🎯 開始生成研究問題
                </button>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                <div class="progress-text" id="progressText">準備中...</div>
            </div>

            <div id="summaryContainer"></div>

            <div class="questions-container" id="questionsContainer">
                <div class="section-title">✅ 生成的研究問題</div>
                <div id="questionsList"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedFolderPath = '';
        let scannedFiles = [];

        // 手動輸入資料夾路徑
        document.getElementById('folderPath').addEventListener('change', async (e) => {
            const path = e.target.value;
            if (path) {
                await scanFolder(path);
            }
        });

        // 掃描資料夾
        async function scanFolder(folderPath) {
            try {
                const response = await fetch('/api/scan_folder', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({folder_path: folderPath})
                });

                const result = await response.json();

                if (result.success) {
                    selectedFolderPath = folderPath;
                    scannedFiles = result.file_list;

                    // Update UI
                    document.getElementById('folderSelector').classList.add('selected');
                    document.getElementById('folderInfo').style.display = 'block';
                    document.getElementById('totalFiles').textContent = result.total_files;
                    document.getElementById('textFiles').textContent = result.text_files;
                    document.getElementById('imageFiles').textContent = result.image_files;

                    // Show file list
                    const fileList = document.getElementById('fileList');
                    fileList.innerHTML = '<strong>檔案清單：</strong><br>' + 
                        result.file_list.map(f => `📄 ${f}`).join('<br>');

                    hideError();
                } else {
                    showError(result.error);
                }
            } catch (error) {
                showError('掃描資料夾時發生錯誤: ' + error.message);
            }
        }

        // 生成研究問題
        async function generateQuestions() {
            const context = document.getElementById('context').value;
            const numQuestions = parseInt(document.getElementById('numQuestions').value);

            // Validation
            if (!context.trim()) {
                showError('請輸入研究背景與目標');
                return;
            }

            if (!selectedFolderPath) {
                showError('請選擇或輸入資料夾路徑');
                return;
            }

            // Disable button
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '處理中...';

            // Show progress
            const progressContainer = document.getElementById('progressContainer');
            progressContainer.classList.add('active');

            try {
                // Start processing
                const response = await fetch('/api/analyze_documents', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        folder_path: selectedFolderPath,
                        context: context,
                        num_questions: numQuestions
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // Show summary
                    if (result.summary) {
                        document.getElementById('summaryContainer').innerHTML = `
                            <div class="summary-box">
                                <div class="summary-title">📊 文件摘要分析</div>
                                <div>${result.summary.replace(/\n/g, '<br>')}</div>
                            </div>
                        `;
                    }

                    // Show questions
                    displayQuestions(result.questions);

                    // Update progress to complete
                    updateProgress(100, '完成！已生成 ' + result.questions.length + ' 個研究問題');

                    hideError();
                } else {
                    showError(result.error);
                }
            } catch (error) {
                showError('生成問題時發生錯誤: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🎯 開始生成研究問題';
            }
        }

        // Display questions
        function displayQuestions(questions) {
            const container = document.getElementById('questionsContainer');
            const list = document.getElementById('questionsList');

            list.innerHTML = questions.map(q => `
                <div class="question-card">
                    <div class="question-id">${q.qid}</div>
                    <div class="question-text">${q.question}</div>
                </div>
            `).join('');

            container.classList.add('active');
            container.scrollIntoView({behavior: 'smooth'});
        }

        // Update progress
        function updateProgress(percentage, text) {
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressFill').textContent = percentage + '%';
            document.getElementById('progressText').textContent = text;
        }

        // Error handling
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('active');
        }

        function hideError() {
            document.getElementById('error').classList.remove('active');
        }
    </script>
</body>
</html>
